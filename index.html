<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lista de Compras inteligente - Organize suas compras de forma prática e visual com categorias, quantidades e muito mais.">
    <title>Lista de Compras | Organize suas compras</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated background blobs -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🛒</span>
                    <div>
                        <h1>Lista de Compras</h1>
                        <p class="subtitle">Organize suas compras facilmente</p>
                    </div>
                </div>
                <div class="header-stats" id="headerStats">
                    <div class="stat-badge">
                        <span class="stat-number" id="totalItems">0</span>
                        <span class="stat-label">itens</span>
                    </div>
                    <div class="stat-badge purchased">
                        <span class="stat-number" id="purchasedItems">0</span>
                        <span class="stat-label">comprados</span>
                    </div>
                    <div class="stat-badge total-price">
                        <span class="stat-number" id="totalPrice">R$ 0,00</span>
                        <span class="stat-label">total estimado</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Add Item Form -->
        <section class="add-item-section">
            <form id="addItemForm" class="add-item-form">
                <div class="form-row">
                    <div class="input-group input-name">
                        <label for="itemName">Nome do item</label>
                        <input type="text" id="itemName" placeholder="Ex: Arroz integral" required autocomplete="off">
                    </div>
                    <div class="input-group input-qty">
                        <label for="itemQuantity">Qtd</label>
                        <input type="number" id="itemQuantity" placeholder="1" min="1" value="1">
                    </div>
                    <div class="input-group input-price">
                        <label for="itemPrice">Preço (R$)</label>
                        <input type="text" id="itemPrice" placeholder="0,00" inputmode="decimal">
                    </div>
                    <div class="input-group input-category">
                        <label for="itemCategory">Categoria</label>
                        <select id="itemCategory">
                            <option value="geral">🏷️ Geral</option>
                            <option value="frutas">🍎 Frutas e Verduras</option>
                            <option value="carnes">🥩 Carnes</option>
                            <option value="laticinios">🧀 Laticínios</option>
                            <option value="padaria">🍞 Padaria</option>
                            <option value="bebidas">🥤 Bebidas</option>
                            <option value="limpeza">🧹 Limpeza</option>
                            <option value="higiene">🧴 Higiene</option>
                            <option value="congelados">🧊 Congelados</option>
                            <option value="outros">📦 Outros</option>
                        </select>
                    </div>
                </div>
                <button type="submit" id="addItemBtn" class="btn-add">
                    <span class="btn-icon">+</span>
                    <span class="btn-text">Adicionar</span>
                </button>
            </form>
        </section>

        <!-- Filters and Actions -->
        <section class="controls-section">
            <div class="filters">
                <button class="filter-btn active" data-filter="all" id="filterAll">
                    Todos
                </button>
                <button class="filter-btn" data-filter="pending" id="filterPending">
                    Pendentes
                </button>
                <button class="filter-btn" data-filter="purchased" id="filterPurchased">
                    Comprados
                </button>
            </div>
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Buscar item...">
            </div>
            <div class="actions">
                <button class="btn-action btn-clear-purchased" id="clearPurchasedBtn" title="Limpar comprados">
                    🗑️ Limpar comprados
                </button>
                <button class="btn-action btn-clear-all" id="clearAllBtn" title="Limpar tudo">
                    ⚠️ Limpar tudo
                </button>
            </div>
        </section>

        <!-- Items List -->
        <main class="items-list-section">
            <div id="itemsList" class="items-list">
                <!-- Items will be rendered here -->
            </div>
            <div id="emptyState" class="empty-state">
                <div class="empty-icon">📝</div>
                <h3>Sua lista está vazia</h3>
                <p>Adicione itens usando o formulário acima para começar a organizar suas compras!</p>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2>✏️ Editar Item</h2>
                <button class="modal-close" id="modalCloseBtn">&times;</button>
            </div>
            <form id="editItemForm" class="modal-body">
                <input type="hidden" id="editItemId">
                <div class="modal-input-group">
                    <label for="editName">Nome do item</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="modal-row">
                    <div class="modal-input-group">
                        <label for="editQuantity">Quantidade</label>
                        <input type="number" id="editQuantity" min="1">
                    </div>
                    <div class="modal-input-group">
                        <label for="editPrice">Preço (R$)</label>
                        <input type="text" id="editPrice" inputmode="decimal">
                    </div>
                </div>
                <div class="modal-input-group">
                    <label for="editCategory">Categoria</label>
                    <select id="editCategory">
                        <option value="geral">🏷️ Geral</option>
                        <option value="frutas">🍎 Frutas e Verduras</option>
                        <option value="carnes">🥩 Carnes</option>
                        <option value="laticinios">🧀 Laticínios</option>
                        <option value="padaria">🍞 Padaria</option>
                        <option value="bebidas">🥤 Bebidas</option>
                        <option value="limpeza">🧹 Limpeza</option>
                        <option value="higiene">🧴 Higiene</option>
                        <option value="congelados">🧊 Congelados</option>
                        <option value="outros">📦 Outros</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" id="modalCancelBtn">Cancelar</button>
                    <button type="submit" class="btn-save">💾 Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirmModal" class="modal-overlay">
        <div class="modal modal-confirm">
            <div class="modal-header">
                <h2>⚠️ Confirmação</h2>
                <button class="modal-close" id="confirmCloseBtn">&times;</button>
            </div>
            <div class="modal-body">
                <p id="confirmMessage">Tem certeza?</p>
                <div class="modal-actions">
                    <button class="btn-cancel" id="confirmCancelBtn">Cancelar</button>
                    <button class="btn-danger" id="confirmOkBtn">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
